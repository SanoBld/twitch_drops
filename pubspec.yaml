name: twitch_drops
description: Custom Twitch Drops miner with Flutter UI
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.4.0
  web_socket_channel: ^2.4.0
  shared_preferences: ^2.2.0
  window_manager: ^0.3.8
  tray_manager: ^0.2.3
  launch_at_startup: ^0.3.0
  provider: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
